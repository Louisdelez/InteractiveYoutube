# Koala TV observability stack — Grafana + Loki + Alloy.
#
# Runs independently of the main app (postgres/redis/app in
# docker-compose.yml). Start with:
#
#   docker compose -f docker-compose.observability.yml up -d
#
# Then browse http://localhost:3000 (admin / admin).
#
# Alloy tails the host's logs/ (server) and the desktop's
# $XDG_DATA_HOME/KoalaTV/logs/ directly — no code change in Koala TV
# itself; everything Pino/tracing already writes is picked up.

services:
  loki:
    image: grafana/loki:3.3.0
    container_name: koala-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./ops/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - '127.0.0.1:3100:3100'
    expose:
      - '3100'
    # Relaxed healthcheck. The old (10 s / 5 retries) spammed wget
    # fork every 10 s while Loki's ring was deadlocked, contributing
    # to the 2026-04-23 system hang. 30 s interval + 60 s start_period
    # is plenty for a single-instance TSDB; on permanent failure,
    # Docker flips to unhealthy in ~90 s instead of hammering the host.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Hard caps — observability must never starve the host.
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0

  alloy:
    image: grafana/alloy:v1.6.0
    container_name: koala-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy
      - --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./ops/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./logs:/var/log/koala/server:ro
      - ${KOALA_DESKTOP_LOGS:-/home/louis/.local/share/KoalaTV/logs}:/var/log/koala/desktop:ro
      - alloy_data:/var/lib/alloy
    expose:
      - '12345'
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 1.0

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: koala-grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/koala-logs.json
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 1.0

volumes:
  loki_data:
  alloy_data:
  grafana_data:
