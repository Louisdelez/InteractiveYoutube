worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Rate limiting ---
    # General API rate limit: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # WebSocket upgrade rate limit: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=ws_upgrade:10m rate=5r/s;

    # --- Upstream (app instances) ---
    upstream app {
        # ip_hash for sticky sessions (required for Socket.IO polling fallback)
        ip_hash;
        server app:4500;
        # Add more instances for horizontal scaling:
        # server app2:4500;
        # server app3:4500;
    }

    # --- HTTP -> HTTPS redirect (uncomment when SSL is configured) ---
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl http2;  # Uncomment for SSL
        server_name _;

        # --- SSL (uncomment and configure) ---
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        # --- Security headers ---
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # --- Client body size ---
        client_max_body_size 1m;

        # --- Socket.IO WebSocket ---
        location /socket.io/ {
            limit_req zone=ws_upgrade burst=10 nodelay;

            proxy_pass http://app;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time
            proxy_buffering off;
            proxy_cache off;
        }

        # --- API routes ---
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Health check (no rate limit) ---
        location /health {
            proxy_pass http://app;
            proxy_http_version 1.1;
        }

        # --- Static files (served by Nginx directly in production) ---
        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
                proxy_pass http://app;
                proxy_http_version 1.1;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
