version: '3.8'

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: interactiveyoutube
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interactiveyoutube}
      POSTGRES_DB: interactiveyoutube
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U interactiveyoutube']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- App (Node.js with PM2 cluster) ---
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4500
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://interactiveyoutube:${POSTGRES_PASSWORD:-interactiveyoutube}@postgres:5432/interactiveyoutube
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://yourdomain.com}
    expose:
      - '4500'

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
